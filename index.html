<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tkzゲームポータル</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="apple-touch-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.svg">
</head>
<body>
    <main class="container">
        <h1>tkzゲームポータル</h1>

        <h2 class="cat">げーむ</h2>
        <div class="grid">
            <a class="tile" href="https://tkzlab.github.io/drawing/"><span class="ico">🎨</span><span class="lbl">おえかき</span></a>
            <a class="tile" href="https://tkzlab.github.io/jigsaw-puzzle/"><span class="ico">🧩</span><span class="lbl">ジグソー</span></a>
            <a class="tile" href="https://tkzlab.github.io/slide-puzzle/"><span class="ico">🔢</span><span class="lbl">パズル</span></a>
            <a class="tile" href="https://tkzlab.github.io/whac-a-mole/"><span class="ico">🔨</span><span class="lbl">もぐらたたき</span></a>
            <a class="tile" href="https://tkzlab.github.io/shiritori-meiro/"><span class="ico">🐾</span><span class="lbl">しりとりめいろ</span></a>
            <a class="tile" href="https://tkzlab.github.io/kana-practice/"><span class="ico">✏️</span><span class="lbl">もじれんしゅう</span></a>
            <a class="tile" href="https://tkzlab.github.io/space-jump/"><span class="ico">🚀</span><span class="lbl">うちゅうドライブ</span></a>
        </div>

        <h2 class="cat cat--art">アート</h2>
        <div class="grid grid--art">
            <a class="tile tile--art" href="https://tkzlab.github.io/light-garden/"><span class="ico">✨</span><span class="lbl">浮遊する光の庭</span></a>
            <a class="tile tile--art" href="https://tkzlab.github.io/kuzureru-sho/"><span class="ico">🖌️</span><span class="lbl">崩れる書</span></a>
        </div>
    </main>
</body>
</html>
